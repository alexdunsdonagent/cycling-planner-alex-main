    <!-- JSON-LD structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Cycling Trip Planner",
      "description": "Match yourself to the perfect cycling destination worldwide in 60 seconds",
      "url": "https://cycling-planner.pages.dev",

    <!-- Google Analytics 4 — replace G-XXXXXXXXXX with your measurement ID -->
    <!-- Get your ID at: analytics.google.com — create property for cycling-planner.pages.dev -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX', {
        page_title: document.title,
        page_location: window.location.href,
      });

      // Custom events — called from App.jsx
      window.trackEvent = function(eventName, params) {
        if (typeof gtag !== 'undefined') {
          gtag('event', eventName, params || {});
        }
      };
    </script>
